# =============================================================================
# Samba Configuration - ZimaOS
# =============================================================================
# Shares for local network access. All shares require the somatczk user.
# =============================================================================

[global]
   workgroup = WORKGROUP
   server string = ZimaOS File Server
   server role = standalone server
   log file = /var/log/samba/log.%m
   max log size = 1000
   logging = file
   panic action = /usr/share/samba/panic-action %d
   obey pam restrictions = yes
   unix password sync = yes
   passwd program = /usr/bin/passwd %u
   passwd chat = *Enter\snew\s*\spassword:* %n\n *Retype\snew\s*\spassword:* %n\n *password\supdated\ssuccessfully* .
   pam password change = yes
   map to guest = never
   usershare allow guests = no

   # Security
   min protocol = SMB2
   client min protocol = SMB2

   # Performance
   socket options = TCP_NODELAY IPTOS_LOWDELAY
   read raw = yes
   write raw = yes
   use sendfile = yes
   aio read size = 16384
   aio write size = 16384

[Media]
   comment = Media Library (Read-Only)
   path = /media/HDD-Storage/media
   valid users = somatczk
   browseable = yes
   read only = yes
   guest ok = no
   create mask = 0644
   directory mask = 0755

[Downloads]
   comment = Downloads (Read-Write)
   path = /media/HDD-Storage/downloads
   valid users = somatczk
   browseable = yes
   read only = no
   guest ok = no
   create mask = 0664
   directory mask = 0775
   force user = somatczk

[Photos]
   comment = Photos Library (Read-Write)
   path = /media/HDD-Storage/media/photos
   valid users = somatczk
   browseable = yes
   read only = no
   guest ok = no
   create mask = 0664
   directory mask = 0775
   force user = somatczk

name: deploy-romulus

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      force_full:
        description: 'Force full deployment'
        type: boolean
        default: false

concurrency:
  group: deploy-romulus
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: [self-hosted, romulus]
    outputs:
      global: ${{ steps.filter.outputs.global }}
      core: ${{ steps.filter.outputs.core }}
      security: ${{ steps.filter.outputs.security }}
      media: ${{ steps.filter.outputs.media }}
      productivity: ${{ steps.filter.outputs.productivity }}
      monitoring: ${{ steps.filter.outputs.monitoring }}
      notifications: ${{ steps.filter.outputs.notifications }}
      utilities: ${{ steps.filter.outputs.utilities }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
      ai: ${{ steps.filter.outputs.ai }}
      hydra: ${{ steps.filter.outputs.hydra }}
      full_deploy: ${{ steps.full-deploy.outputs.result }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Detect Path Changes
        uses: dorny/paths-filter@9d7afb8d214ad99e78fbd4247752c4caed2b6e4c # v4.0.0
        id: filter
        with:
          filters: |
            global:
              - 'scripts/**'
              - 'docker/**'
              - '.github/workflows/**'
            core:
              - 'stacks/core/**'
              - 'configs/traefik/**'
            security:
              - 'stacks/security/**'
              - 'configs/authelia/**'
              - 'configs/crowdsec/**'
            media:
              - 'stacks/media/**'
            productivity:
              - 'stacks/productivity/**'
            monitoring:
              - 'stacks/monitoring/**'
              - 'configs/prometheus/**'
              - 'configs/grafana/**'
              - 'configs/loki/**'
              - 'configs/promtail/**'
            notifications:
              - 'stacks/notifications/**'
            utilities:
              - 'stacks/utilities/**'
            dashboard:
              - 'stacks/dashboard/**'
              - 'configs/homepage/**'
            ai:
              - 'stacks/ai/**'
              - 'configs/openclaw/**'
            hydra:
              - 'stacks/hydra/**'
              - 'configs/hydra/**'

      - name: Determine Full Deploy
        id: full-deploy
        run: |
          if [[ "${{ inputs.force_full }}" == "true" ]]; then
            echo "Manual full deployment requested"
            echo "result=true" >> $GITHUB_OUTPUT
          elif [[ "${{ steps.filter.outputs.global }}" == "true" ]]; then
            echo "Global files changed - triggering full deployment"
            echo "result=true" >> $GITHUB_OUTPUT
          else
            echo "Selective deployment based on changed paths"
            echo "result=false" >> $GITHUB_OUTPUT
          fi

          echo ""
          echo "=== DEPLOYMENT DECISION SUMMARY ==="
          echo "  Global ........... ${{ steps.filter.outputs.global }}"
          echo "  Core ............. ${{ steps.filter.outputs.core }}"
          echo "  Security ......... ${{ steps.filter.outputs.security }}"
          echo "  Media ............ ${{ steps.filter.outputs.media }}"
          echo "  Productivity ..... ${{ steps.filter.outputs.productivity }}"
          echo "  Monitoring ....... ${{ steps.filter.outputs.monitoring }}"
          echo "  Notifications .... ${{ steps.filter.outputs.notifications }}"
          echo "  Utilities ........ ${{ steps.filter.outputs.utilities }}"
          echo "  Dashboard ........ ${{ steps.filter.outputs.dashboard }}"
          echo "  AI ............... ${{ steps.filter.outputs.ai }}"
          echo "  Hydra ............ ${{ steps.filter.outputs.hydra }}"
          echo "===================================="

  prepare:
    name: Prepare Environment
    needs: detect-changes
    runs-on: [self-hosted, romulus]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Generate .env
        run: |
          cat > stacks/.env <<'EOF'
          # --- System ---
          PUID=999
          PGID=1000
          TZ=Europe/Budapest
          # --- Storage Paths ---
          SSD=/media/SSD-Storage
          HDD=/media/HDD-Storage
          APPDATA=/media/SSD-Storage/appdata
          # --- Domain ---
          DOMAIN=${{ secrets.DOMAIN }}
          # --- Cloudflare ---
          CF_API_TOKEN=${{ secrets.CF_API_TOKEN }}
          # --- Database Passwords ---
          NEXTCLOUD_DB_PASSWORD=${{ secrets.NEXTCLOUD_DB_PASSWORD }}
          IMMICH_DB_PASSWORD=${{ secrets.IMMICH_DB_PASSWORD }}
          # --- GitHub (CI/CD) ---
          GITHUB_PAT=${{ secrets.G_PAT }}
          GITHUB_ORG=${{ secrets.G_ORG }}
          # --- Redis ---
          NEXTCLOUD_REDIS_PASSWORD=${{ secrets.NEXTCLOUD_REDIS_PASSWORD }}
          # --- Backup ---
          RESTIC_PASSWORD=${{ secrets.RESTIC_PASSWORD }}
          # --- Notifications ---
          NTFY_BASE_URL=${{ secrets.NTFY_BASE_URL }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          # --- Grafana ---
          GRAFANA_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          # --- CrowdSec ---
          CROWDSEC_BOUNCER_API_KEY=${{ secrets.CROWDSEC_BOUNCER_API_KEY }}
          # --- qBittorrent ---
          QBIT_WEBUI_PASSWORD=${{ secrets.QBIT_WEBUI_PASSWORD }}
          # --- Speedtest Tracker ---
          SPEEDTEST_APP_KEY=${{ secrets.SPEEDTEST_APP_KEY }}
          # --- TeamSpeak ---
          TEAMSPEAK_DB_PASSWORD=${{ secrets.TEAMSPEAK_DB_PASSWORD }}
          # --- Authelia ---
          AUTHELIA_SESSION_SECRET=${{ secrets.AUTHELIA_SESSION_SECRET }}
          AUTHELIA_STORAGE_ENCRYPTION_KEY=${{ secrets.AUTHELIA_STORAGE_ENCRYPTION_KEY }}
          AUTHELIA_JWT_SECRET=${{ secrets.AUTHELIA_JWT_SECRET }}
          # --- Paperless-ngx ---
          PAPERLESS_DB_PASSWORD=${{ secrets.PAPERLESS_DB_PASSWORD }}
          PAPERLESS_SECRET_KEY=${{ secrets.PAPERLESS_SECRET_KEY }}
          PAPERLESS_ADMIN_PASSWORD=${{ secrets.PAPERLESS_ADMIN_PASSWORD }}
          # --- Hydra Trading ---
          HYDRA_DB_PASSWORD=${{ secrets.HYDRA_DB_PASSWORD }}
          BINANCE_API_KEY=${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET=${{ secrets.BINANCE_API_SECRET }}
          BYBIT_API_KEY=${{ secrets.BYBIT_API_KEY }}
          BYBIT_API_SECRET=${{ secrets.BYBIT_API_SECRET }}
          KRAKEN_API_KEY=${{ secrets.KRAKEN_API_KEY }}
          KRAKEN_API_SECRET=${{ secrets.KRAKEN_API_SECRET }}
          OKX_API_KEY=${{ secrets.OKX_API_KEY }}
          OKX_API_SECRET=${{ secrets.OKX_API_SECRET }}
          OKX_PASSPHRASE=${{ secrets.OKX_PASSPHRASE }}
          HYDRA_TESTNET=${{ secrets.HYDRA_TESTNET }}
          HYDRA_TELEGRAM_BOT_TOKEN=${{ secrets.HYDRA_TELEGRAM_BOT_TOKEN }}
          HYDRA_TELEGRAM_CHAT_ID=${{ secrets.HYDRA_TELEGRAM_CHAT_ID }}
          EOF

      - name: Rsync to /DATA/stacks/
        run: |
          rsync -a --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'deploy.sh' \
            --exclude 'configs/authelia/users_database.yml' \
            ./ /DATA/stacks/

      - name: Ensure Docker Networks
        run: |
          for net in proxy socket media db-nextcloud db-immich monitoring ci db-paperless ai hydra; do
            docker network create "$net" 2>/dev/null || true
          done

      - name: Ensure Restic Installed
        run: |
          if [ ! -f /DATA/bin/restic ]; then
            mkdir -p /DATA/bin
            RESTIC_VERSION="0.17.3"
            curl -sSL "https://github.com/restic/restic/releases/download/v${RESTIC_VERSION}/restic_${RESTIC_VERSION}_linux_amd64.bz2" \
              | bunzip2 > /DATA/bin/restic
            chmod +x /DATA/bin/restic
          fi

  deploy-core:
    name: Deploy Core
    needs: [detect-changes, prepare]
    runs-on: [self-hosted, romulus]
    if: >-
      needs.detect-changes.outputs.full_deploy == 'true' ||
      needs.detect-changes.outputs.core == 'true'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Deploy Core Stack
        uses: ./.github/actions/deploy-services
        with:
          stack: core

      - name: Wait for Traefik
        run: |
          echo "Waiting 15s for Traefik certificate resolution..."
          sleep 15
          cd /DATA/stacks/stacks
          if docker compose -f core/compose.yml ps --format json 2>/dev/null | jq -e 'select(.Name | contains("traefik")) | select(.Health == "healthy")' > /dev/null 2>&1; then
            echo "Traefik is healthy"
          else
            echo "::warning::Traefik may not be healthy yet"
          fi

  deploy-security:
    name: Deploy Security
    needs: [detect-changes, deploy-core]
    runs-on: [self-hosted, romulus]
    if: >-
      always() &&
      needs.deploy-core.result != 'failure' &&
      (needs.detect-changes.outputs.full_deploy == 'true' ||
       needs.detect-changes.outputs.security == 'true')

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Deploy Security Stack
        uses: ./.github/actions/deploy-services
        with:
          stack: security

  generate-matrix:
    name: Generate Deployment Matrix
    needs: [detect-changes, deploy-security]
    runs-on: [self-hosted, romulus]
    if: always() && needs.deploy-security.result != 'failure'
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
      has_stacks: ${{ steps.generate.outputs.has_stacks }}
    
    steps:
      - name: Generate Matrix
        id: generate
        run: |
          STACKS='[]'
          HAS_STACKS="false"
          
          if [[ "${{ needs.detect-changes.outputs.full_deploy }}" == "true" ]]; then
            echo "Full deployment - including all stacks"
            STACKS='["media","productivity","monitoring","notifications","utilities","dashboard","ai","hydra"]'
            HAS_STACKS="true"
          else
            # Build array of stacks that have changes
            CHANGED_STACKS='[]'
            
            if [[ "${{ needs.detect-changes.outputs.media }}" == "true" ]]; then
              CHANGED_STACKS=$(echo $CHANGED_STACKS | jq -c '. += ["media"]')
            fi
            if [[ "${{ needs.detect-changes.outputs.productivity }}" == "true" ]]; then
              CHANGED_STACKS=$(echo $CHANGED_STACKS | jq -c '. += ["productivity"]')
            fi
            if [[ "${{ needs.detect-changes.outputs.monitoring }}" == "true" ]]; then
              CHANGED_STACKS=$(echo $CHANGED_STACKS | jq -c '. += ["monitoring"]')
            fi
            if [[ "${{ needs.detect-changes.outputs.notifications }}" == "true" ]]; then
              CHANGED_STACKS=$(echo $CHANGED_STACKS | jq -c '. += ["notifications"]')
            fi
            if [[ "${{ needs.detect-changes.outputs.utilities }}" == "true" ]]; then
              CHANGED_STACKS=$(echo $CHANGED_STACKS | jq -c '. += ["utilities"]')
            fi
            if [[ "${{ needs.detect-changes.outputs.dashboard }}" == "true" ]]; then
              CHANGED_STACKS=$(echo $CHANGED_STACKS | jq -c '. += ["dashboard"]')
            fi
            if [[ "${{ needs.detect-changes.outputs.ai }}" == "true" ]]; then
              CHANGED_STACKS=$(echo $CHANGED_STACKS | jq -c '. += ["ai"]')
            fi
            if [[ "${{ needs.detect-changes.outputs.hydra }}" == "true" ]]; then
              CHANGED_STACKS=$(echo $CHANGED_STACKS | jq -c '. += ["hydra"]')
            fi
            
            STACKS=$CHANGED_STACKS
            
            # Check if we have any stacks to deploy
            if [[ $(echo $STACKS | jq '. | length') -gt 0 ]]; then
              HAS_STACKS="true"
              echo "Stacks to deploy: $(echo $STACKS | jq -r '. | join(", ")')"
            else
              echo "No stacks to deploy"
            fi
          fi
          
          echo "matrix={\"stack\":$STACKS}" >> $GITHUB_OUTPUT
          echo "has_stacks=$HAS_STACKS" >> $GITHUB_OUTPUT

  deploy-apps:
    name: Deploy ${{ matrix.stack }}
    needs: [generate-matrix]
    runs-on: [self-hosted, romulus]
    if: always() && needs.generate-matrix.result == 'success' && needs.generate-matrix.outputs.has_stacks == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Login to GHCR (for private images)
        if: matrix.stack == 'hydra'
        env:
          GHCR_TOKEN: ${{ secrets.G_PAT }}
        run: echo "$GHCR_TOKEN" | docker login ghcr.io -u somatczk --password-stdin

      - name: Seed Hydra config from Docker image
        if: matrix.stack == 'hydra'
        run: |
          IMAGE=$(grep FROM stacks/hydra/engine/Dockerfile | awk '{print $2}')
          docker pull "$IMAGE"
          APPDATA=/media/SSD-Storage/appdata
          mkdir -p "$APPDATA/hydra/config/strategies"
          docker run --rm "$IMAGE" sh -c 'tar cf - -C /app config/strategies 2>/dev/null || true' | tar xf - -C "$APPDATA/hydra/" --keep-old-files 2>/dev/null || true

      - name: Deploy ${{ matrix.stack }}
        uses: ./.github/actions/deploy-services
        with:
          stack: ${{ matrix.stack }}
          force_recreate_services: ${{ matrix.stack == 'monitoring' && 'grafana' || matrix.stack == 'dashboard' && 'homepage' || matrix.stack == 'hydra' && 'hydra-engine' || '' }}

  verify:
    name: Verify Deployment
    needs: [detect-changes, generate-matrix, deploy-apps]
    runs-on: [self-hosted, romulus]
    if: always()

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Health Check
        id: health
        uses: ./.github/actions/health-check

      - name: Send Notification
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DEPLOY_RESULT: ${{ needs.deploy-apps.result }}
          HEALTH_OUTCOME: ${{ steps.health.outcome }}
        run: |
          if [[ "$DEPLOY_RESULT" == "failure" || "$HEALTH_OUTCOME" == "failure" ]]; then
            STATUS="FAILED"
            EMOJI="x"
            TG_EMOJI="&#10060;"
          else
            STATUS="SUCCESS"
            EMOJI="white_check_mark"
            TG_EMOJI="&#9989;"
          fi

          SHORT_SHA="${GITHUB_SHA:0:7}"
          MSG="Deployment ${STATUS} for commit ${SHORT_SHA} on $(date -u '+%Y-%m-%d %H:%M UTC')"

          # ntfy (internal)
          curl -s --max-time 10 \
            -H "Title: Romulus Deploy: ${STATUS}" \
            -H "Tags: ${EMOJI}" \
            -d "$MSG" \
            "http://ntfy:80/deployments" || true

          # Telegram
          TG_TEXT="${TG_EMOJI} <b>Romulus Deploy: ${STATUS}</b>"$'\n'"${MSG}"
          curl -s --max-time 10 \
            -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "text=${TG_TEXT}" || true

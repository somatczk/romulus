apiVersion: 1
contactPoints:
  - orgId: 1
    name: telegram
    receivers:
      - uid: telegram-infra
        type: telegram
        settings:
          bottoken: "$TELEGRAM_BOT_TOKEN"
          chatid: "TEMPLATED_TELEGRAM_CHAT_ID"
          parse_mode: HTML
          disable_web_page_preview: true
        disableResolveMessage: false
  - orgId: 1
    name: ntfy
    receivers:
      - uid: ntfy-infra
        type: webhook
        settings:
          url: "http://ntfy:80/grafana-alerts"
          httpMethod: POST
        disableResolveMessage: false

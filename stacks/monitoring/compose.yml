services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    env_file: ../.env
    networks:
      - monitoring
      - proxy
      - socket
    volumes:
      - ../../configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../configs/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - ${APPDATA}/monitoring/prometheus/data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    labels:
      - traefik.enable=true
      - traefik.http.routers.prometheus.rule=Host(`prometheus.${DOMAIN}`)
      - traefik.http.routers.prometheus.entrypoints=websecure
      - traefik.http.routers.prometheus.tls.certresolver=cloudflare
      - traefik.http.routers.prometheus.middlewares=secure-admin@file
      - traefik.http.services.prometheus.loadbalancer.server.port=9090
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
    security_opt:
      - no-new-privileges:true

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    env_file: ../.env
    user: "999"
    networks:
      - monitoring
      - proxy
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SERVER_ROOT_URL=https://grafana.${DOMAIN}
      - GF_INSTALL_PLUGINS=grafana-clock-panel
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    entrypoint:
      - /bin/sh
      - -c
      - |
        cp -r /etc/grafana/provisioning-src/* /etc/grafana/provisioning/
        sed -i "s/TEMPLATED_TELEGRAM_CHAT_ID/$$TELEGRAM_CHAT_ID/" /etc/grafana/provisioning/alerting/contactpoints.yml
        exec /run.sh
    volumes:
      - ${APPDATA}/monitoring/grafana:/var/lib/grafana
      - ../../configs/grafana/provisioning:/etc/grafana/provisioning-src:ro
      - ../../configs/grafana/dashboards:/var/lib/grafana/dashboards:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.grafana.rule=Host(`grafana.${DOMAIN}`)
      - traefik.http.routers.grafana.entrypoints=websecure
      - traefik.http.routers.grafana.tls.certresolver=cloudflare
      - traefik.http.routers.grafana.middlewares=secure@file
      - traefik.http.services.grafana.loadbalancer.server.port=3000
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
    security_opt:
      - no-new-privileges:true

  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    env_file: ../.env
    networks:
      - monitoring
    volumes:
      - ../../configs/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - ${APPDATA}/monitoring/loki:/loki
    command: -config.file=/etc/loki/local-config.yaml
    deploy:
      resources:
        limits:
          memory: 512M
    security_opt:
      - no-new-privileges:true

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: unless-stopped
    networks:
      - monitoring
      - socket
    environment:
      - DOCKER_HOST=tcp://socket-proxy:2375
    volumes:
      - ../../configs/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    deploy:
      resources:
        limits:
          memory: 256M
    security_opt:
      - no-new-privileges:true

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    pid: host
    networks:
      - monitoring
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    deploy:
      resources:
        limits:
          memory: 128M
    security_opt:
      - no-new-privileges:true

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.51.0
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    networks:
      - monitoring
      - socket
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    command:
      - --docker_only=true
      - --housekeeping_interval=30s
      - --store_container_labels=false
      - --disable_metrics=advtcp,cpu_topology,cpuset,hugetlb,memory_numa,process,referenced_memory,resctrl,sched,tcp,udp
    deploy:
      resources:
        limits:
          memory: 512M

  nvidia-gpu-exporter:
    image: utkuozdemir/nvidia_gpu_exporter:1.4.1
    container_name: nvidia-gpu-exporter
    restart: unless-stopped
    runtime: nvidia
    networks:
      - monitoring
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        limits:
          memory: 64M

  restic-exporter:
    image: ngosang/restic-exporter:latest
    container_name: restic-exporter
    restart: unless-stopped
    env_file: ../.env
    networks:
      - monitoring
    environment:
      RESTIC_REPOSITORY: ${HDD}/backups/restic-repo
      RESTIC_PASSWORD: ${RESTIC_PASSWORD}
      REFRESH_INTERVAL: 3600
    volumes:
      - ${HDD}/backups/restic-repo:${HDD}/backups/restic-repo:ro
    deploy:
      resources:
        limits:
          memory: 128M
    security_opt:
      - no-new-privileges:true

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: unless-stopped
    env_file: ../.env
    networks:
      - monitoring
      - proxy
      - socket
    environment:
      - DOCKER_HOST=tcp://socket-proxy:2375
    volumes:
      - ${APPDATA}/monitoring/uptime-kuma:/app/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.status.rule=Host(`status.${DOMAIN}`)
      - traefik.http.routers.status.entrypoints=websecure
      - traefik.http.routers.status.tls.certresolver=cloudflare
      - traefik.http.routers.status.middlewares=secure@file
      - traefik.http.services.status.loadbalancer.server.port=3001
    deploy:
      resources:
        limits:
          memory: 512M
    security_opt:
      - no-new-privileges:true

  glances:
    image: nicolargo/glances:latest-full
    container_name: glances
    restart: unless-stopped
    pid: host
    networks:
      - monitoring
      - proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /:/rootfs:ro
    environment:
      - GLANCES_OPT=-w
    labels:
      - traefik.enable=true
      - traefik.http.routers.glances.rule=Host(`glances.${DOMAIN}`)
      - traefik.http.routers.glances.entrypoints=websecure
      - traefik.http.routers.glances.tls.certresolver=cloudflare
      - traefik.http.routers.glances.middlewares=secure-admin@file
      - traefik.http.services.glances.loadbalancer.server.port=61208
    deploy:
      resources:
        limits:
          memory: 512M

  smartctl-exporter:
    image: prometheuscommunity/smartctl-exporter:latest
    container_name: smartctl-exporter
    restart: unless-stopped
    privileged: true
    networks:
      - monitoring
    volumes:
      - /dev:/dev:ro
    deploy:
      resources:
        limits:
          memory: 64M

networks:
  monitoring:
    external: true
  proxy:
    external: true
  socket:
    external: true

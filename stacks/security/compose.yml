networks:
  proxy:
    external: true
  monitoring:
    external: true
  authelia:
    driver: bridge

services:
  authelia:
    build: ./authelia
    image: authelia/authelia:4.39.15
    container_name: authelia
    restart: unless-stopped
    env_file: ../.env
    networks:
      - proxy
      - authelia
    volumes:
      - ../../configs/authelia:/config
      - ${APPDATA}/security/authelia:/data
    environment:
      TZ: ${TZ}
      AUTHELIA_SESSION_SECRET: ${AUTHELIA_SESSION_SECRET}
      AUTHELIA_STORAGE_ENCRYPTION_KEY: ${AUTHELIA_STORAGE_ENCRYPTION_KEY}
      AUTHELIA_JWT_SECRET: ${AUTHELIA_JWT_SECRET}
    labels:
      traefik.enable: "true"
      traefik.http.routers.authelia.rule: "Host(`auth.${DOMAIN}`)"
      traefik.http.routers.authelia.entrypoints: "websecure"
      traefik.http.routers.authelia.tls.certresolver: "cloudflare"
      traefik.http.routers.authelia.middlewares: "secure-headers@file"
      traefik.http.services.authelia.loadbalancer.server.port: "9091"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9091/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256m
    security_opt:
      - no-new-privileges:true

  crowdsec:
    build: ./crowdsec
    image: crowdsecurity/crowdsec:v1.7.6
    container_name: crowdsec
    restart: unless-stopped
    env_file: ../.env
    networks:
      - proxy
      - monitoring
    volumes:
      - ${APPDATA}/security/crowdsec/config:/etc/crowdsec
      - ${APPDATA}/security/crowdsec/db:/var/lib/crowdsec/data
      - ${APPDATA}/security/crowdsec/hub:/etc/crowdsec/hub
      - /var/log:/var/log:ro
    environment:
      COLLECTIONS: "crowdsecurity/linux crowdsecurity/sshd crowdsecurity/traefik crowdsecurity/nextcloud"
      GID: "${PGID}"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256m
    security_opt:
      - no-new-privileges:true

  crowdsec-bouncer:
    build: ./crowdsec-bouncer
    image: fbonalair/traefik-crowdsec-bouncer:0.5.0
    container_name: crowdsec-bouncer
    restart: unless-stopped
    env_file: ../.env
    networks:
      - proxy
    environment:
      CROWDSEC_BOUNCER_API_KEY: "${CROWDSEC_BOUNCER_API_KEY:-changeme_crowdsec_bouncer_key}"
      CROWDSEC_AGENT_HOST: "crowdsec:8080"
      GIN_MODE: "release"
    depends_on:
      - crowdsec
    healthcheck:
      test: ["NONE"]
    deploy:
      resources:
        limits:
          memory: 128m
    security_opt:
      - no-new-privileges:true

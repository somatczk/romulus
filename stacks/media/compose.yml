    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    env_file: ../.env
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080
      - QBT_WEBUI_PASSWORD=${QBIT_WEBUI_PASSWORD}
    volumes:
      - ${APPDATA}/media/qbittorrent:/config
      - ${HDD}/downloads:/downloads
    ports:
      - 6881:6881
      - 6881:6881/udp
    networks:
      - proxy
      - media
    labels:
      - traefik.enable=true
      - traefik.http.routers.qbit.rule=Host(`qbit.${DOMAIN}`)
      - traefik.http.routers.qbit.entrypoints=websecure
      - traefik.http.routers.qbit.tls.certresolver=cloudflare
      - traefik.http.routers.qbit.middlewares=secure-admin@file
      - traefik.http.services.qbit.loadbalancer.server.port=8080
    deploy:
      resources:
        limits:
          memory: 2G
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    env_file: ../.env
    environment:
      - TZ=${TZ}
    volumes:
      - ${APPDATA}/media/jellyseerr:/app/config
    networks:
      - proxy
      - media
    labels:
      - traefik.enable=true
      - traefik.http.routers.requests.rule=Host(`requests.${DOMAIN}`)
      - traefik.http.routers.requests.entrypoints=websecure
      - traefik.http.routers.requests.tls.certresolver=cloudflare
      - traefik.http.routers.requests.middlewares=secure-headers@file
      - traefik.http.services.requests.loadbalancer.server.port=5055
    deploy:
      resources:
        limits:
          memory: 512M
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

networks:
  proxy:
    external: true
  media:
    external: true

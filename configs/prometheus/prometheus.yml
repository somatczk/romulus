global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alert-rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080

  - job_name: docker
    static_configs:
      - targets:
          - 192.168.0.3:9323

  - job_name: traefik
    static_configs:
      - targets:
          - traefik:8082

  - job_name: nvidia-gpu
    static_configs:
      - targets:
          - nvidia-gpu-exporter:9835

  - job_name: loki
    static_configs:
      - targets:
          - loki:3100

  - job_name: restic
    scrape_interval: 5m
    static_configs:
      - targets:
          - restic-exporter:8001

  - job_name: crowdsec
    static_configs:
      - targets:
          - crowdsec:6060

  - job_name: speedtest
    scrape_interval: 6h
    scrape_timeout: 120s
    static_configs:
      - targets:
          - speedtest-exporter:9798

  - job_name: ntfy
    metrics_path: /metrics
    static_configs:
      - targets:
          - ntfy:80

  - job_name: smartctl
    static_configs:
      - targets:
          - smartctl-exporter:9633

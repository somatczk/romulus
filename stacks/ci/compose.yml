networks:
  ci:
    external: true
  ci-socket:
    driver: bridge
  proxy:
    external: true

x-runner: &runner-defaults
  image: myoung34/github-runner:latest
  env_file: ../.env
  networks:
    - ci
    - ci-socket
    - proxy
  environment:
    DOCKER_HOST: tcp://ci-socket-proxy:2375
    DOCKER_CONFIG: /tmp/.docker
    RUNNER_SCOPE: org
    ORG_NAME: ${GITHUB_ORG}
    ACCESS_TOKEN: ${GITHUB_PAT}
    RUNNER_NAME_PREFIX: zimaos
    LABELS: self-hosted,linux,x64,zimaos,org-dsfsm
    EPHEMERAL: "true"
    DISABLE_AUTO_UPDATE: "true"
    RUNNER_WORKDIR: /work
  deploy:
    resources:
      limits:
        memory: 6G
        cpus: "4.0"
  security_opt:
    - no-new-privileges:true
  restart: unless-stopped

x-solhouse-runner: &solhouse-defaults
  image: myoung34/github-runner:latest
  env_file: ../.env
  networks:
    - ci
    - ci-socket
    - proxy
  environment:
    DOCKER_HOST: tcp://ci-socket-proxy:2375
    DOCKER_CONFIG: /tmp/.docker
    RUNNER_SCOPE: repo
    REPO_URL: https://github.com/somatczk/solhouse-nextjs
    ACCESS_TOKEN: ${GITHUB_PAT}
    RUNNER_NAME_PREFIX: zimaos-solhouse
    LABELS: self-hosted,linux,x64,zimaos,solhouse
    EPHEMERAL: "true"
    DISABLE_AUTO_UPDATE: "true"
    RUNNER_WORKDIR: /work
  deploy:
    resources:
      limits:
        memory: 6G
        cpus: "4.0"
  security_opt:
    - no-new-privileges:true
  restart: unless-stopped

x-romulus-runner: &romulus-defaults
  image: myoung34/github-runner:latest
  env_file: ../.env
  networks:
    - ci
    - ci-socket
    - proxy
  environment:
    DOCKER_HOST: tcp://ci-socket-proxy:2375
    DOCKER_CONFIG: /tmp/.docker
    RUNNER_SCOPE: repo
    REPO_URL: https://github.com/somatczk/romulus
    ACCESS_TOKEN: ${GITHUB_PAT}
    RUNNER_NAME_PREFIX: zimaos-romulus
    LABELS: self-hosted,linux,x64,zimaos,romulus
    EPHEMERAL: "true"
    DISABLE_AUTO_UPDATE: "true"
    RUNNER_WORKDIR: /work
  deploy:
    resources:
      limits:
        memory: 6G
        cpus: "4.0"
  security_opt:
    - no-new-privileges:true
  restart: unless-stopped

services:
  ci-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3
    container_name: ci-socket-proxy
    restart: unless-stopped
    networks:
      - ci-socket
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      SERVICES: 1
      TASKS: 1
      VOLUMES: 1
      POST: 1
      BUILD: 1
      COMMIT: 0
      EXEC: 1
      EVENTS: 1
      INFO: 1
      LOG_LEVEL: warning
    deploy:
      resources:
        limits:
          memory: 128m
    security_opt:
      - no-new-privileges:true

  gh-runner-1:
    <<: *runner-defaults
    container_name: gh-runner-1
    volumes:
      - ${APPDATA}/ci/runners/runner-1:/work

  gh-runner-2:
    <<: *runner-defaults
    container_name: gh-runner-2
    volumes:
      - ${APPDATA}/ci/runners/runner-2:/work

  gh-runner-3:
    <<: *runner-defaults
    container_name: gh-runner-3
    volumes:
      - ${APPDATA}/ci/runners/runner-3:/work

  gh-runner-4:
    <<: *runner-defaults
    container_name: gh-runner-4
    volumes:
      - ${APPDATA}/ci/runners/runner-4:/work

  gh-runner-solhouse-1:
    <<: *solhouse-defaults
    container_name: gh-runner-solhouse-1
    volumes:
      - ${APPDATA}/ci/runners/runner-solhouse-1:/work

  gh-runner-solhouse-2:
    <<: *solhouse-defaults
    container_name: gh-runner-solhouse-2
    volumes:
      - ${APPDATA}/ci/runners/runner-solhouse-2:/work

  gh-runner-solhouse-3:
    <<: *solhouse-defaults
    container_name: gh-runner-solhouse-3
    volumes:
      - ${APPDATA}/ci/runners/runner-solhouse-3:/work

  gh-runner-solhouse-4:
    <<: *solhouse-defaults
    container_name: gh-runner-solhouse-4
    volumes:
      - ${APPDATA}/ci/runners/runner-solhouse-4:/work

  gh-runner-romulus-1:
    <<: *romulus-defaults
    container_name: gh-runner-romulus-1
    volumes:
      - ${APPDATA}/ci/runners/runner-romulus-1:/work
      - /DATA/stacks:/DATA/stacks

  gh-runner-romulus-2:
    <<: *romulus-defaults
    container_name: gh-runner-romulus-2
    volumes:
      - ${APPDATA}/ci/runners/runner-romulus-2:/work
      - /DATA/stacks:/DATA/stacks

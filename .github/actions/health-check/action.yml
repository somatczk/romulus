name: 'Health Check'
description: 'Checks for unhealthy or restarting containers across all stacks'

runs:
  using: 'composite'
  steps:
    - name: Check Container Health
      shell: bash
      run: |
        unhealthy=$(docker ps --filter health=unhealthy --format "{{.Names}}" 2>/dev/null)
        restarting=$(docker ps --filter status=restarting --format "{{.Names}}" 2>/dev/null)

        if [ -n "$unhealthy" ]; then
          echo "::error::Unhealthy containers: $unhealthy"
        fi
        if [ -n "$restarting" ]; then
          echo "::error::Restarting containers: $restarting"
        fi

        [ -z "$unhealthy" ] && [ -z "$restarting" ]

name: 'Deploy Services'
description: 'Deploys a stack by name from /DATA/stacks/stacks/'

inputs:
  stack:
    description: 'Stack name (directory under stacks/)'
    required: true
  force_recreate_services:
    description: 'Space-separated service names to force-recreate before the main up'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Deploy Stack
      shell: bash
      run: |
        cd /DATA/stacks/stacks

        if [ -n "${{ inputs.force_recreate_services }}" ]; then
          echo "Force-recreating: ${{ inputs.force_recreate_services }}"
          docker compose --env-file .env -f ${{ inputs.stack }}/compose.yml \
            up -d --build --force-recreate ${{ inputs.force_recreate_services }}
        fi

        echo "Deploying stack: ${{ inputs.stack }}"
        docker compose --env-file .env -f ${{ inputs.stack }}/compose.yml \
          up -d --build --remove-orphans

    - name: Check Stack Health
      shell: bash
      run: |
        sleep 15
        cd /DATA/stacks/stacks
        docker compose -f ${{ inputs.stack }}/compose.yml ps --format json 2>/dev/null | \
          jq -r 'select(.Health == "unhealthy") | .Name' 2>/dev/null | while read -r name; do
            if [ -n "$name" ]; then
              echo "::warning::Unhealthy: $name"
            fi
          done || true

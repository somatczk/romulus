    env_file: ../.env
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${APPDATA}/media/bazarr:/config
      - ${HDD}/media/movies:/movies
      - ${HDD}/media/series:/tv
    networks:
      - proxy
      - media
    labels:
      - traefik.enable=true
      - traefik.http.routers.bazarr.rule=Host(`bazarr.${DOMAIN}`)
      - traefik.http.routers.bazarr.entrypoints=websecure
      - traefik.http.routers.bazarr.tls.certresolver=cloudflare
      - traefik.http.routers.bazarr.middlewares=secure-admin@file
      - traefik.http.services.bazarr.loadbalancer.server.port=6767
    deploy:
